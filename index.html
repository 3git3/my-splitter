<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Lossless Splitter Pro (Fixed)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/coi-serviceworker/0.1.7/coi-serviceworker.min.js"></script>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; text-align: center; color: #333; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #007bff; font-weight: bold; text-align: center; }
        #log { margin-top: 10px; font-size: 10px; color: #888; background: #f9f9f9; padding: 10px; border-radius: 5px; max-height: 100px; overflow-y: auto; white-space: pre-wrap; }
        .result { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>無劣化分割（エラー修正版）</h1>
    <div class="input-group">
        <label>ファイルを選択</label>
        <input type="file" id="fileInput">
    </div>
    <div class="input-group">
        <label>分割サイズ (MB)</label>
        <input type="number" id="sizeInput" value="24">
    </div>
    <button id="runBtn">分割を開始する</button>

    <div id="status">待機中</div>
    <div id="log">ログ: 準備完了</div>
    <div id="result" class="result"></div>
</div>

<script>
    const { FFmpeg } = FFmpegWasm;
    const { fetchFile, toBlobURL } = FFmpegUtil;
    let ffmpeg = null;

    const btn = document.getElementById('runBtn');
    const status = document.getElementById('status');
    const logEl = document.getElementById('log');
    const res = document.getElementById('result');

    const addLog = (m) => { logEl.innerText += `\n${m}`; logEl.scrollTop = logEl.scrollHeight; };

    btn.onclick = async () => {
        const file = document.getElementById('fileInput').files[0];
        const mb = document.getElementById('sizeInput').value;
        if (!file) return alert("ファイルを選んでね");

        btn.disabled = true;
        status.innerText = "エンジン起動中...";
        res.innerHTML = "";

        try {
            if (!ffmpeg) {
                ffmpeg = new FFmpeg();
                // ログを画面に出す
                ffmpeg.on('log', ({ message }) => addLog(message));
                
                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                });
            }

            status.innerText = "データ読み込み中...";
            await ffmpeg.writeFile('input', await fetchFile(file));

            status.innerText = "分割中...（無劣化）";
            const ext = file.name.split('.').pop();
            
            await ffmpeg.exec([
                '-i', 'input', '-f', 'segment',
                '-segment_size', (mb * 1024 * 1024).toString(),
                '-c', 'copy', '-reset_timestamps', '1',
                `output_%03d.${ext}`
            ]);

            status.innerText = "完了！";
            const files = await ffmpeg.listDir('/');
            for (const f of files) {
                if (f.name.startsWith('output_') && !f.isDir) {
                    const data = await ffmpeg.readFile(f.name);
                    const url = URL.createObjectURL(new Blob([data.buffer]));
                    res.innerHTML += `<a href="${url}" download="split_${f.name}" style="display:block; margin-bottom:10px; color:#007bff; font-weight:bold;">💾 ${f.name} を保存</a>`;
                }
            }
        } catch (e) {
            addLog("エラー: " + e.message);
            status.innerText = "失敗しました";
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
