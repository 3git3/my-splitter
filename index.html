<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無劣化メディア分割ツール</title>
  
  <script src="./coi-serviceworker.js"></script>
  
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
  
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .hidden { display: none; }
    .progress-bar { width: 100%; background: #eee; height: 20px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .progress-fill { width: 0%; background: #4caf50; height: 100%; transition: width 0.3s; }
    #log-box { width: 100%; height: 150px; background: #222; color: #0f0; font-family: monospace; font-size: 12px; padding: 10px; overflow-y: scroll; box-sizing: border-box; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    input[type="file"] { margin-bottom: 10px; }
  </style>
</head>
<body>

  <h2>無劣化メディア分割ツール</h2>

  <div class="card">
    <input type="file" id="file-input" accept="video/*,audio/*">
    <div id="file-info" class="hidden" style="font-weight: bold; margin-bottom: 10px;"></div>
    
    <label>目標サイズ (MB): <input type="number" id="mb-input" value="50" min="1"></label><br><br>
    
    <button id="split-btn" disabled>分割を開始する</button>
  </div>

  <div id="progress-card" class="card hidden">
    <div>状態: <span id="prog-text">準備中...</span> (<span id="prog-pct">0%</span>)</div>
    <div class="progress-bar"><div id="prog-fill" class="progress-fill"></div></div>
  </div>

  <div class="card">
    <h4>ログ</h4>
    <div id="log-box"></div>
  </div>

  <div id="result-card" class="card hidden">
    <h4>分割完了！</h4>
    <div id="result-body"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
