<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無劣化メディア分割ツール</title>

  <!--
    ★★★ 重要 ★★★
    coi-serviceworker.js は unpkg.com ではなくこのリポジトリ内のファイルを参照します。
    index.html / app.js / coi-serviceworker.js の 3 ファイルを同じディレクトリに置いてください。
  -->
  <script src="coi-serviceworker.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f0f;
      --surface:      #1a1a1a;
      --surface2:     #242424;
      --border:       #333;
      --text:         #e8e8e8;
      --muted:        #888;
      --accent:       #a78bfa;
      --accent-dark:  #7c3aed;
      --success:      #34d399;
      --error:        #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .wrap { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 16px; }

    .hd h1  { font-size: 22px; font-weight: 600; letter-spacing: -.3px; margin-bottom: 4px; }
    .hd p   { font-size: 13px; color: var(--muted); line-height: 1.6; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label  { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    input[type="file"] {
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 14px 12px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: border-color .2s;
    }
    input[type="file"]:hover { border-color: var(--accent); }

    .mb-row { display: flex; align-items: center; gap: 10px; }
    input[type="number"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      width: 110px;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { outline: none; border-color: var(--accent); }
    .mb-unit { font-size: 15px; color: var(--muted); }

    #file-info {
      display: none;
      font-size: 13px;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 6px;
      padding: 8px 12px;
    }
    #file-info.show { display: block; }

    #split-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    #split-btn:hover:not(:disabled) { background: var(--accent-dark); }
    #split-btn:disabled { opacity: .4; cursor: not-allowed; }

    #progress-card { display: none; }
    #progress-card.show { display: flex; }

    .prog-header { display: flex; justify-content: space-between; align-items: center; }
    #prog-text   { font-size: 14px; }
    #prog-pct    { font-size: 14px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }

    .prog-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    #prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dark), var(--accent));
      border-radius: 99px;
      width: 0%;
      transition: width .3s ease;
    }

    #log-box {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      max-height: 130px;
      overflow-y: auto;
      background: var(--surface2);
      border-radius: 6px;
      padding: 8px 10px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
    }

    #result-card { display: none; border-color: #1e4a3a; }
    #result-card.show { display: flex; }
    #result-card .rlabel { font-size: 14px; font-weight: 600; color: var(--success); }
    #result-card .rbody  { font-size: 13px; color: var(--muted); white-space: pre-wrap; line-height: 1.7; }

    #error-card { display: none; border-color: #4a1e1e; }
    #error-card.show { display: flex; }
    #error-card .rlabel { font-size: 14px; font-weight: 600; color: var(--error); }
    #error-card .rbody  { font-size: 13px; color: var(--muted); font-family: 'Courier New', monospace; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <h1>無劣化メディア分割ツール</h1>
    <p>mp3 / mp4 / m4a / mkv などを、指定した MB サイズに<br>再エンコードなしで分割します（ブラウザ完結）</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="file-input">分割するファイル</label>
      <input type="file" id="file-input" accept=".mp3,.mp4,.m4a,.mkv,.avi,.wav,.aac,.ogg,.webm">
      <div id="file-info"></div>
    </div>

    <div class="field">
      <label>分割サイズ</label>
      <div class="mb-row">
        <input type="number" id="mb-input" value="24" min="1" max="9999">
        <span class="mb-unit">MB ごとに分割</span>
      </div>
    </div>

    <button id="split-btn">分割開始</button>
  </div>

  <div class="card" id="progress-card">
    <div class="prog-header">
      <span id="prog-text">準備中...</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="prog-bar"><div id="prog-fill"></div></div>
    <div id="log-box"></div>
  </div>

  <div class="card" id="result-card">
    <span class="rlabel">✓ 分割完了</span>
    <span class="rbody" id="result-body"></span>
  </div>

  <div class="card" id="error-card">
    <span class="rlabel">エラーが発生しました</span>
    <span class="rbody" id="error-body"></span>
  </div>

</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script src="app.js"></script>
</body>
</html>
