<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無劣化メディア分割ツール</title>
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --on-surface: #e0e0e0;
      --primary: #bb86fc;
    }
    body {
      background: var(--bg);
      color: var(--on-surface);
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: var(--surface);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    input[type="file"], input[type="number"], button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      box-sizing: border-box;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
    }
    button {
      background: var(--primary);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .progress-info {
      margin-top: 10px;
      font-size: 14px;
    }
    .progress-bar {
      width: 100%;
      height: 20px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>無劣化メディア分割ツール</h1>

      <label for="fileInput">分割するファイル (mp3/mp4など):</label>
      <input type="file" id="fileInput" accept=".mp3,.mp4,.m4a,.mkv,.avi">

      <label for="mbInput">分割サイズ (MB):</label>
      <input type="number" id="mbInput" value="24" min="1">

      <button id="splitBtn">分割開始</button>

      <div class="progress-info" id="progressInfo">準備中...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <!-- ffmpeg.wasm 本体 -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.4/dist/ffmpeg.min.js"></script>
  <!-- ffprobe.wasm を利用するための簡易ラッパー（後述） -->
  <script src="https://unpkg.com/@ffmpeg/core@0.12.4/dist/ffmpeg-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
